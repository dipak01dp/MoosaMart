<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MoosaMart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f1f3f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .login-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            background: #fff;
            border-radius: 12px; /* Smoother corners */
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        /* Left Side (MoosaMart Branding) */
        .login-branding {
            background: #2874f0; /* Keeping the trusty Blue */
            width: 40%;
            padding: 50px 30px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center; /* Center align for logo */
            justify-content: center; /* Vertically center content */
            text-align: center;
        }

        /* --- YOUR LOGO FIX --- */
        .brand-logo-cnt {
            width: 100px;
            height: 100px;
            background: white; /* White circle background */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .brand-logo-cnt img {
            width: 80%; /* Logo fits inside the white circle */
            height: 80%;
            object-fit: contain; /* Ensures logo doesn't stretch */
        }

        .login-branding h2 { font-size: 32px; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        .login-branding h2 span { color: #fb641b; /* Mart in Orange */ }
        .login-branding p { font-size: 16px; line-height: 1.5; color: #dbdbdb; margin-top: 10px; }

        /* Right Side (Form) */
        .login-form-box {
            width: 60%;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
        }

        .form-header h3 { font-size: 22px; margin-bottom: 30px; color: #333; }

        .input-group { position: relative; margin-bottom: 30px; }
        
        .input-group input {
            width: 100%;
            padding: 12px 0;
            font-size: 16px;
            border: none;
            border-bottom: 2px solid #e0e0e0;
            outline: none;
            transition: 0.3s;
        }

        .input-group label {
            position: absolute;
            top: 12px;
            left: 0;
            color: #999;
            pointer-events: none;
            transition: 0.3s;
            font-size: 16px;
        }

        /* Input Animation */
        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            font-size: 12px;
            color: #2874f0;
            font-weight: 600;
        }

        .input-group input:focus { border-bottom-color: #2874f0; }

        .terms-text { font-size: 12px; color: #878787; margin-bottom: 25px; line-height: 1.4; }
        .terms-text span { color: #2874f0; cursor: pointer; font-weight: 600; }

        .submit-btn {
            width: 100%;
            background: #fb641b; /* MoosaMart Orange */
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(251, 100, 27, 0.3);
            transition: all 0.3s ease;
        }

        .submit-btn:hover { background: #e65a16; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(251, 100, 27, 0.4); }
        .submit-btn:active { transform: translateY(1px); }

        .create-account {
            text-align: center;
            margin-top: auto;
            padding-top: 40px;
            color: #2874f0;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: block;
            font-size: 15px;
        }
        .create-account:hover { text-decoration: underline; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .login-container { flex-direction: column; width: 100%; max-width: 450px; }
            .login-branding { width: 100%; padding: 30px 20px; height: auto; flex-direction: row; gap: 15px; text-align: left; justify-content: flex-start;}
            .brand-logo-cnt { width: 60px; height: 60px; margin-bottom: 0; border-width: 2px;}
            .login-branding h2 { font-size: 24px; margin-bottom: 0; }
            .login-branding p { display: none; }
            .login-form-box { width: 100%; padding: 30px 20px; }
            .form-header h3 { font-size: 18px; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-branding">
            <div class="brand-logo-cnt">
                <img src="logo.jpeg" alt="MoosaMart Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1162/1162499.png'"> 
            </div>
            <div>
                <h2>Moosa<span>Mart</span></h2>
                <p>Welcome back! Sign in to access your orders and wishlist.</p>
            </div>
        </div>

        <div class="login-form-box">
            <div class="form-header">
                <h3>Sign in to your account</h3>
            </div>
            
            <form action="index.html" onsubmit="saveUser(event)">
                <div class="input-group">
                    <input type="text" id="userName" required>
                    <label>Enter Full Name</label>
                </div>

                <div class="input-group">
                    <input type="text" id="userPhone" maxlength="10" pattern="[0-9]{10}" required>
                    <label>Enter Mobile Number</label>
                </div>

                <div class="input-group">
                    <input type="password" id="userPass" required>
                    <label>Enter Password</label>
                </div>

                <p class="terms-text">By continuing, you agree to MoosaMart's <span>Terms of Use</span> and <span>Privacy Policy</span>.</p>

                <button type="submit" class="submit-btn">Login</button>
            </form>

            <a href="signup.html" class="create-account">New to MoosaMart? Create an account</a>
        </div>
    </div>

    <script>
        function saveUser(event) {
            // Demo logic
            const name = document.getElementById('userName').value;
            localStorage.setItem('moosaUser', name);
            localStorage.setItem('isLoggedIn', 'true');
        }
    </script>
</body>
</html>
